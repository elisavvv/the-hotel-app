<mat-toolbar color="primary" class="brand-toolbar">
  <img class="brand-logo" src="assets/logo.svg" alt="Логотип" style="height: 65px; margin-right: 16px;">
  <span class="brand-name">HotelApp</span>
  
  <nav class="nav-buttons">
    <a mat-button routerLink="/" class="nav-button">Главная</a>
    <a mat-button routerLink="/services" class="nav-button">Услуги</a>
    <a mat-button routerLink="/booking/1" class="nav-button">Бронирование</a>
  </nav>

  <span class="spacer"></span>

  <button *ngIf="isAuthenticated$ | async" mat-button (click)="logout()">
    <mat-icon>logout</mat-icon> Выход
  </button>
</mat-toolbar>

<main class="main-content">
  <router-outlet></router-outlet>
</main>
