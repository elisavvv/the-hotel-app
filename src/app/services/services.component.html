<h2>Дополнительные услуги</h2>

<div class="services-container">
  <!-- Доступные услуги -->
  <div *ngIf="services$ | async as services" 
       class="services-list" 
       cdkDropList
       [cdkDropListData]="services"
       [cdkDropListConnectedTo]="['selectedServicesList']"
       (cdkDropListDropped)="drop($event)">
    <div *ngFor="let service of services" 
         class="service-card" 
         cdkDrag>
      <div class="service-content">
        <img [src]="service.photo" 
             [alt]="service.name" 
             class="service-image"
             (error)="handleImageError($event, service)">
        <div class="service-info">
          <h3>{{ service.name }}</h3>
          <p>{{ service.description }}</p>
          <div class="service-details">
            <span>Цена: {{ service.price }} руб.</span>
            <span>Длительность: {{ service.duration }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Выбранные услуги -->
  <div class="selected-services">
    <h3>Выбранные услуги</h3>
    <div class="selected-list" 
         cdkDropList
         id="selectedServicesList"
         [cdkDropListData]="selectedServices"
         (cdkDropListDropped)="drop($event)">
      <div *ngFor="let service of selectedServices" 
           class="service-card selected" 
           cdkDrag>
        <div class="service-content">
          <img [src]="service.photo" 
               [alt]="service.name" 
               class="service-image"
               (error)="handleImageError($event, service)">
          <div class="service-info">
            <h3>{{ service.name }}</h3>
            <p>{{ service.description }}</p>
            <div class="service-details">
              <span>Цена: {{ service.price }} руб.</span>
              <span>Длительность: {{ service.duration }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
